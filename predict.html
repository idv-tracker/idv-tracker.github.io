<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ハンター予測 | 第五人格トラッカー</title>
  <meta name="description" content="BANキャラとマップから対戦相手のハンターを予測します。">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f3460">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ハンター予測">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="icon" type="image/png" sizes="180x180" href="icon.png">
  <link rel="shortcut icon" href="icon.png">
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-EL23B3L2TD"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-EL23B3L2TD');
  </script>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6919699894432312" crossorigin="anonymous"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="base.css">
  <link rel="stylesheet" href="predict-style.css">
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>
<body>
<script>if(localStorage.getItem('identity5_dark_mode')==='on')document.body.classList.add('dark-mode');</script>
<main>

  <!-- ===== 接続ページ ===== -->
  <div id="connect-page" class="page">
    <div class="connect-wrap">
      <div class="connect-header">
        <div class="connect-app-brand">第五人格トラッカー</div>
        <h1 class="connect-app-title">ハンター予測</h1>
        <div class="connect-app-sub">BAN構成 × マップ分析</div>
        <p class="connect-desc">BANキャラとマップの情報から、対戦相手のハンターを過去データに基づいて予測します。</p>
      </div>
      <div class="connect-card">
        <h2 class="connect-card-title">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
          同期コードで連携
        </h2>
        <p class="connect-card-desc">第五人格トラッカーの設定から発行した同期コードを入力してください。</p>
        <input type="text" id="sync-code-input" class="connect-input" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" autocomplete="off" spellcheck="false">
        <button type="button" class="connect-btn primary" onclick="connectWithSyncCode()">読み込む</button>
      </div>
      <div class="connect-card">
        <h2 class="connect-card-title">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          JSONで読み込む
        </h2>
        <p class="connect-card-desc">トラッカーの設定からエクスポートしたデータを貼り付けるか、ファイルを選択してください。</p>
        <textarea id="json-input" class="connect-textarea" placeholder="エクスポートしたJSONデータをここに貼り付け"></textarea>
        <div class="connect-btn-row">
          <button type="button" class="connect-btn primary" onclick="connectWithJSON()">貼り付けから読み込む</button>
          <span class="connect-btn-or">または</span>
          <button type="button" class="connect-btn secondary" onclick="document.getElementById('json-file').click()">ファイルを選択</button>
        </div>
        <input type="file" id="json-file" accept=".json,.txt" style="display:none" onchange="connectWithJSONFile(event)">
      </div>
      <a href="index.html" class="connect-back-link">← トラッカーに戻る</a>
    </div>
  </div>

  <!-- ===== メインページ ===== -->
  <div id="main-page" class="page hidden">

    <div class="pr-header">
      <div class="pr-header-top">
        <a href="index.html" class="back-link">← トラッカー</a>
        <button type="button" class="disconnect-btn" onclick="showDisconnectMenu()">接続解除</button>
      </div>
      <div class="pr-header-titles">
        <div class="pr-brand">第五人格トラッカー</div>
        <div class="pr-title">ハンター予測</div>
      </div>
      <div id="stats-header" class="stats-header"></div>
    </div>

    <!-- ロック画面 -->
    <div id="lock-screen" class="lock-screen hidden">
      <div class="lock-icon">🔒</div>
      <div class="lock-title">サバイバー視点100試合以上で解放</div>
      <div class="lock-progress">
        <div class="lock-progress-track">
          <div class="lock-progress-bar" id="lock-progress-bar"></div>
        </div>
        <div class="lock-progress-text" id="lock-progress-text"></div>
      </div>
      <div class="lock-message" id="lock-message"></div>
    </div>

    <!-- メインコンテンツ -->
    <div id="main-content" class="hidden">

      <!-- 入力セクション -->
      <div class="pr-input-section">
        <div class="pr-input-card">
          <h2 class="pr-input-title">予測条件を入力</h2>

          <div class="pr-form-group">
            <label class="pr-form-label">マップ</label>
            <select id="predict-map">
              <option value="">選択してください</option>
            </select>
          </div>

          <div class="pr-form-group">
            <label class="pr-form-label">サバイバーBAN（1〜3体）</label>
            <div class="pr-ban-grid">
              <select id="predict-ban-1"><option value="">なし</option></select>
              <select id="predict-ban-2"><option value="">なし</option></select>
              <select id="predict-ban-3"><option value="">なし</option></select>
            </div>
          </div>

          <div class="pr-form-group">
            <label class="pr-form-label">ハンターBAN（0〜3体）</label>
            <div class="pr-ban-grid">
              <select id="predict-hban-1"><option value="">なし</option></select>
              <select id="predict-hban-2"><option value="">なし</option></select>
              <select id="predict-hban-3"><option value="">なし</option></select>
            </div>
          </div>

          <button type="button" class="pr-predict-btn" onclick="runPrediction()">予測する</button>
        </div>
      </div>

      <!-- 結果セクション -->
      <div id="predict-result" class="pr-result-section hidden">
        <h2 class="pr-result-title">予測結果 TOP5</h2>
        <div id="predict-result-list" class="pr-result-list"></div>

        <!-- ハンター選択セクション -->
        <div class="pr-select-section">
          <h3 class="pr-select-title">試合入力へ進む</h3>
          <p class="pr-select-desc">対戦相手のハンターを選択してください</p>
          <div id="predict-hunter-buttons" class="pr-hunter-buttons"></div>
        </div>
      </div>

    </div>
  </div>

</main>

<script src="shared.js"></script>
<script src="predict-app.js"></script>
</body>
</html>
